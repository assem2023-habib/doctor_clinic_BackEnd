version: "3.9"

services:
  redis:
    build:
      context: ./docker/redis
      dockerfile: Dockerfile
    container_name: doctor-clinic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
