version: "3.9"

services:
  redis:
    build:
      context: ./docker/redis
      dockerfile: Dockerfile
    container_name: doctor-clinic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  php-fpm:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: doctor-clinic-php
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - .:/var/www/html
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    container_name: doctor-clinic-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm
    networks:
      - app-network

volumes:
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
